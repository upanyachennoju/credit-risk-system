data:
  raw_path: "data/raw/synthetic_credit_risk.csv"
  processed_path: "data/processed/ingested_data.csv"

preprocessing:
  test_size: 0.2
  random_state: 42
  stratified: true
  
  imputation:
    numeric: "median"
    categorical: "most_frequent"
  
  scaling:
    numeric: "StandardScaler"
    categorical: "OneHotEncoder"

mlflow:
  enabled: true
  tracking_uri: "file:./mlruns"  
  experiment_name: "credit-risk-models"
  registry_enabled: true
  tags:
    project: "credit-risk-system"
    environment: "development"
    version: "1.0"

training:
  random_state: 42
  cv_folds: 5
  n_jobs: -1
  
  class_weight: "balanced"
  
  hyperparameter_tuning:
    enabled: true
    n_iter: 50
    scoring_metric: "recall"  

models:
  
  logistic_regression:
    algorithm: "GridSearchCV"
    best_params:
      C: 0.1  # Regularization strength (adjust based on tuning results)
      solver: "saga"
      class_weight: "balanced"
      random_state: 42
      max_iter: 200
    threshold: 0.80  # Custom threshold (adjust based on precision-recall tradeoff)
    notes: "Best with grid search over C values [0.001, 0.01, 0.1, 1, 10, 100]"
  
  random_forest:
    algorithm: "RandomizedSearchCV"
    best_params:
      n_estimators: 172
      max_depth: 5
      max_features: null
      min_samples_leaf: 3
      min_samples_split: 2
      class_weight: "balanced"
      random_state: 42
    threshold: 0.5  # Default probability threshold
    notes: "Tuned over 50 iterations with recall as primary metric"
  
  xgboost:
    algorithm: "RandomizedSearchCV"
    best_params:
      n_estimators: 300
      max_depth: 4
      learning_rate: 0.05
      subsample: 0.8
      colsample_bytree: 0.8
      eval_metric: "logloss"
      scale_pos_weight: "auto"  # Calculated as neg_count / pos_count
      random_state: 42
    threshold: 0.3  # Tuned for recall optimization
    notes: "50 iterations RandomizedSearch; scale_pos_weight handles class imbalance"

artifacts:
  preprocessor_path: "artifacts/preprocessors/preprocessing.pkl"
  transformed_data_path: "artifacts/transformed_data/"
  model_path: "artifacts/models/"
  report_path: "artifacts/reports/"

evaluation:
  primary_metric: "recall"  # Minimize false negatives (missed defaults)
  secondary_metrics:
    - "precision"
    - "f1_score"
    - "roc_auc"
    - "specificity"
  
  threshold_optimization:
    enabled: true
    strategy: "precision_recall_curve"
    min_recall: 0.70  # Catch at least 70% of defaults
    max_false_positive_rate: 0.30  # Allow up to 30% false positive rate

